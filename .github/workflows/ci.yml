name: ci
on:
  push: { branches: [main] }
  pull_request:
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: shellcheck
        run: |
          sudo apt-get update -q && sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh tests/*.sh
      - name: tests
        run: bash tests/run_tests.sh
# Release hardening (wire at first tag, see docs/PUBLISHING.md):
# artifact attestations, OpenSSF Scorecard, gitleaks, npm OIDC provenance.
